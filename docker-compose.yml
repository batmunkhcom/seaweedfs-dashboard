services:
  dashboard:
    build: .
    ports:
      - "8081:8081"
    environment:
      - SEAWEEDFS_MASTER_HOSTS=${SEAWEEDFS_MASTER_HOSTS}
      - SEAWEEDFS_FILER_HOST=${SEAWEEDFS_FILER_HOST}
      - DATABASE_URL=sqlite:///data/data.db
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - READONLY_USER=${READONLY_USER:-viewer}
      - READONLY_PASSWORD=${READONLY_PASSWORD:-viewpass}
      - SESSION_SECRET=${SESSION_SECRET:-random-secret-change-me}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
