name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Create .env
        run: |
          echo "SEAWEEDFS_MASTER_HOSTS=localhost:9333" > .env
          echo "SEAWEEDFS_FILER_HOST=localhost:8888" >> .env
          echo "SEAWEEDFS_VOLUME_HOSTS=localhost:8080" >> .env
          echo "SEAWEEDFS_S3_GATEWAY_HOSTS=localhost:8333" >> .env
          echo "DATABASE_URL=sqlite:///data/test.db" >> .env
          echo "SESSION_SECRET=test-secret-for-ci" >> .env
          echo "ADMIN_USER=admin" >> .env
          echo "ADMIN_PASSWORD=testpass" >> .env
          echo "DISK_HEALTH_ENABLED=false" >> .env
          mkdir -p data
      - name: Run unit tests
        run: python -m pytest tests/ -v -m "not integration" --tb=short 2>&1

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npx vitest run

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend lint (ruff)
        run: |
          pip install ruff
          cd backend && ruff check .
      - name: Frontend lint
        run: |
          cd frontend && npx eslint . --max-warnings 50 2>/dev/null || echo "eslint not configured yet"
